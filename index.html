<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Love Cinema ❤️</title>

<style>

body{
margin:0;
font-family:Arial;
background:black;
color:white;
overflow:hidden;
text-align:center;
}

/* ===== LOCK ===== */
.lock{
position:fixed;
width:100%;
height:100%;
background:black;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
z-index:9999;
}

.lock input{
padding:10px;
margin:5px;
border-radius:10px;
border:none;
text-align:center;
}

.lock button{
padding:10px 20px;
border:none;
border-radius:20px;
background:pink;
font-weight:bold;
cursor:pointer;
}

/* ===== INTRO ===== */
.intro{
position:fixed;
width:100%;
height:100%;
background:black;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
z-index:9998;
opacity:0;
animation:intro 3s forwards;
}

@keyframes intro{
0%{opacity:0;transform:scale(1.2);}
30%{opacity:1;}
100%{opacity:0;transform:scale(1);}
}

/* ===== MAIN ===== */
.main{
display:none;
animation:show 1s forwards;
}

@keyframes show{
from{opacity:0;}
to{opacity:1;}
}

/* TITLE */
h1{
color:pink;
font-size:35px;
margin-top:20px;
}

/* COUNTER */
.counter-card{
margin:15px auto;
padding:15px;
max-width:350px;
border-radius:20px;
background:rgba(255,255,255,0.08);
backdrop-filter:blur(10px);
box-shadow:0 0 25px rgba(255,105,180,0.6);
color:pink;
font-weight:bold;
}

/* SLIDES */
.slide{
position:absolute;
width:100%;
height:100%;
object-fit:cover;
opacity:0;
transition:1.5s;
z-index:-1;
}

.show{
opacity:0.3;
}

/* TEXT */
#text{
max-width:700px;
margin:20px auto;
font-size:18px;
line-height:1.7;
min-height:100px;
}

/* BUTTON */
button{
padding:12px 25px;
border:none;
border-radius:25px;
background:pink;
font-weight:bold;
cursor:pointer;
margin-top:10px;
}

/* HEART */
.heart{
position:fixed;
bottom:-10px;
color:red;
animation:float 5s linear infinite;
}

@keyframes float{
0%{transform:translateY(0);opacity:1;}
100%{transform:translateY(-120vh);opacity:0;}
}

/* BIG HEART */
.big-heart{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
font-size:120px;
opacity:0;
animation:heartPop 2s ease;
z-index:9999;
}

@keyframes heartPop{
0%{opacity:0;transform:translate(-50%,-50%) scale(0.5);}
50%{opacity:1;transform:translate(-50%,-50%) scale(1.2);}
100%{opacity:0;transform:translate(-50%,-50%) scale(0.5);}
}

</style>
</head>

<body>

<!-- LOCK -->
<div class="lock" id="lock">
<h2>Enter Name & Password ❤️</h2>
<input id="name" placeholder="Your Name">
<input id="pass" type="password" placeholder="Password">
<button onclick="enter()">Enter</button>
</div>

<!-- INTRO -->
<div class="intro" id="intro">
<h1>💖 Love Story 💖</h1>
<p>Fekry ❤️ Mariam</p>
</div>

<!-- SLIDES -->
<img class="slide show" src="https://raw.githubusercontent.com/56wrcjv67t-lgtm/love_site/main/IMG_7882.jpeg">
<img class="slide" src="https://raw.githubusercontent.com/56wrcjv67t-lgtm/love_site/main/F2BCD207-D6DD-4B3F-887D-3F670C2628A3.jpeg">

<!-- MAIN -->
<div class="main" id="main">

<h1 id="title">Love Cinema ❤️</h1>

<div class="counter-card" id="counter"></div>

<button onclick="openMemory()">Open Memory 💖</button>

<div id="text"></div>

</div>

<!-- MUSIC -->
<audio id="music" loop>
<source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_d1a7a0c6d2.mp3?filename=romantic-music-ambient-110397.mp3">
</audio>

<script>

/* ENTER */
function enter(){
let name=document.getElementById("name").value;
let pass=document.getElementById("pass").value;

if(pass==="Love"){
document.getElementById("lock").style.display="none";
document.getElementById("main").style.display="block";

document.getElementById("title").innerText =
name + " ❤️ Mariam";

showHeart();
type();
}else{
alert("Wrong Password ❤️");
}
}

/* BIG HEART */
function showHeart(){
let h=document.createElement("div");
h.classList.add("big-heart");
h.innerHTML="❤️";
document.body.appendChild(h);
setTimeout(()=>h.remove(),2000);
}

/* SLIDES */
let slides=document.querySelectorAll(".slide");
let index=0;

setInterval(()=>{
slides.forEach(s=>s.classList.remove("show"));
slides[index].classList.add("show");
index++;
if(index>=slides.length) index=0;
},3000);

/* HEARTS */
setInterval(()=>{
let h=document.createElement("div");
h.classList.add("heart");
h.innerHTML="❤️";
h.style.left=Math.random()*100+"vw";
h.style.fontSize=Math.random()*25+15+"px";
document.body.appendChild(h);
setTimeout(()=>h.remove(),5000);
},300);

/* COUNTER */
function updateCounter(){

let startDate = new Date("2025-09-04");
let now = new Date();

let diff = now - startDate;

let days = Math.floor(diff/(1000*60*60*24));
let hours = Math.floor((diff/(1000*60*60))%24);
let minutes = Math.floor((diff/(1000*60))%60);
let seconds = Math.floor((diff/1000)%60);

document.getElementById("counter").innerHTML =
"💖 4/9/2025<br>" +
"⏳ " + days + "d : " + hours + "h : " + minutes + "m : " + seconds + "s";
}

setInterval(updateCounter,1000);
updateCounter();

/* TEXT */
let text="بحبك اوي يا مريم ❤️ انتي مش مجرد حب، انتي حياتي كلها ❤️ ربنا يخليكي ليا ويبعد عنك أي حاجة وحشة ❤️";
let words=text.split(" ");
let i=0;

function type(){
if(i<words.length){
document.getElementById("text").innerHTML += words[i]+" ";
i++;
setTimeout(type,350);
}
}

/* MEMORY */
function openMemory(){
document.getElementById("music").play();
if(i===0) type();
}

</script>

</body>
</html>
