<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>فكري & مريم 💖</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #6b0f24; 
            --card-bg: rgba(255, 255, 255, 0.1);
            --border-color: rgba(255, 255, 255, 0.2);
            --text-color: #ffffff;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Cairo', sans-serif;
            background: linear-gradient(135deg, #4a0717, #80152e);
            color: var(--text-color);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
        }

        #lock-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            z-index: 10;
        }

        .avatar {
            width: 85px;
            height: 85px;
            border-radius: 50%;
            border: 3px solid rgba(255, 255, 255, 0.5);
            object-fit: cover;
            margin-bottom: -20px;
            z-index: 2;
        }

        .heart-box {
            background: #a81c3e;
            width: 280px;
            height: 280px;
            position: relative;
            transform: rotate(-45deg);
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            display: flex;
            justify-content: center;
            align-items: center;
            margin-top: 10px;
        }

        .heart-box::before, .heart-box::after {
            content: "";
            background: #a81c3e;
            border-radius: 50%;
            position: absolute;
            width: 280px;
            height: 280px;
        }

        .heart-box::before { top: -140px; left: 0; }
        .heart-box::after { left: 140px; top: 0; }

        .heart-content {
            transform: rotate(45deg);
            position: absolute;
            z-index: 5;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .heart-content h2 { margin: 0; font-size: 26px; }
        .heart-content p { font-size: 14px; margin: 5px 0 15px 0; opacity: 0.8; }

        .pass-input {
            background: rgba(255, 255, 255, 0.15);
            border: 1px solid var(--border-color);
            padding: 10px 15px;
            border-radius: 15px;
            color: white;
            text-align: center;
            font-size: 16px;
            outline: none;
            width: 180px;
            backdrop-filter: blur(5px);
        }

        .unlock-btn {
            background: #4a0717;
            color: white;
            border: none;
            padding: 12px 40px;
            border-radius: 15px;
            margin-top: 25px;
            font-size: 18px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            transition: 0.3s;
        }

        #main-site {
            display: none;
            width: 100%;
            max-width: 450px;
            padding: 20px;
            box-sizing: border-box;
            text-align: center;
            padding-bottom: 120px;
        }

        .main-title { font-size: 32px; margin-bottom: 5px; }

        .card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
            backdrop-filter: blur(10px);
        }

        .counter-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin-top: 15px;
        }

        .counter-item {
            background: rgba(0, 0, 0, 0.2);
            padding: 10px;
            border-radius: 12px;
        }

        .counter-item span { display: block; font-size: 24px; font-weight: bold; }
        .counter-item label { font-size: 12px; opacity: 0.7; }

        .memory-img {
            width: 100%;
            border-radius: 15px;
            margin-top: 15px;
        }

        .music-player {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            max-width: 400px;
            background: rgba(40, 5, 12, 0.85);
            border: 1px solid var(--border-color);
            border-radius: 30px;
            padding: 12px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            backdrop-filter: blur(10px);
            z-index: 100;
        }

        .player-info { display: flex; align-items: center; gap: 10px; font-size: 14px;}
        .player-info img { width: 40px; height: 40px; border-radius: 50%; animation: spin 4s linear infinite; }
        
        .play-btn {
            background: white;
            color: #4a0717;
            border: none;
            width: 35px;
            height: 35px;
            border-radius: 50%;
            font-size: 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        @keyframes spin { 100% { transform: rotate(360deg); } }
        .error { color: #ff8ca3; font-size: 14px; margin-top: 10px; display: none; }
    </style>
</head>
<body>

    <div id="lock-screen">
        <img class="avatar" src="https://raw.githubusercontent.com/56wrcjv67t-lgtm/love_site/refs/heads/main/IMG_7882.jpeg" alt="avatar">
        <div class="heart-box">
            <div class="heart-content">
                <h2>جاهزهـ😉</h2>
                <p>فكري & مريم</p>
                <input type="password" id="pass" class="pass-input" placeholder="Password">
                <div id="error-txt" class="error">كلمة المرور خاطئة! ❌</div>
            </div>
        </div>
        <button class="unlock-btn" onclick="unlockSite()">💕 Unlock 💕</button>
    </div>

    <div id="main-site">
        <h1 class="main-title">فكري & مريم 💞</h1>
        
        <div class="card">
            <div style="font-size: 14px; margin-bottom: 10px;">✨ بقالنا سوا من 04-09-2025 ✨</div>
            <div class="counter-grid">
                <div class="counter-item"><span id="days">0</span><label>يوم</label></div>
                <div class="counter-item"><span id="hours">0</span><label>ساعة</label></div>
                <div class="counter-item"><span id="mins">0</span><label>دقيقة</label></div>
                <div class="counter-item"><span id="secs">0</span><label>ثانية</label></div>
            </div>
            <p style="font-size: 14px; margin-top: 15px; margin-bottom: 0;">كل ثانية بتعدي وانتِ في قلبي ❤️</p>
        </div>

        <div class="card">
            <p style="font-size: 18px; font-weight: bold; margin: 0;">❤️ أول مرة شفتك فيها</p>
            <div style="background: rgba(0,0,0,0.2); padding: 5px 15px; display: inline-block; border-radius: 10px; margin: 10px 0; font-size: 12px;">2025-09-21 📅</div>
            
            <p style="font-size: 16px; opacity: 0.95; line-height: 1.6;">
                بحبك يمريم ي اغلي من عمري ربنا يخليكي ليا يروحي وميحرمنيش منك ابدا ينور عيني🫂♥️
            </p>
            
            <img class="memory-img" src="https://raw.githubusercontent.com/56wrcjv67t-lgtm/love_site/refs/heads/main/F2BCD207-D6DD-4B3F-887D-3F670C2628A3.jpeg" alt="أول مقابلة">
        </div>
    </div>

    <div class="music-player" id="custom-player" style="display: none;">
        <div class="player-info">
            <img src="https://raw.githubusercontent.com/56wrcjv67t-lgtm/love_site/refs/heads/main/IMG_7882.jpeg" alt="album-art">
            <div>
                <div style="font-weight: bold;">وانا جنب حبيبي 😍</div>
                <div style="font-size: 11px; opacity: 0.7;">عمرو دياب</div>
            </div>
        </div>
        <audio id="bg-music" loop>
            <source src="https://bayanat.ai/files/track.mp3" type="audio/mpeg">
        </audio>
        <button class="play-btn" onclick="toggleMusic()" id="play-icon">▶</button>
    </div>

    <script>
        function unlockSite() {
            const password = document.getElementById('pass').value;
            if(password.toLowerCase() === "love") {
                document.getElementById('lock-screen').style.display = 'none';
                document.getElementById('main-site').style.display = 'block';
                document.getElementById('custom-player').style.display = 'flex';
                
                var audio = document.getElementById('bg-music');
                audio.play().catch(function(error) {
                    console.log("التحميل التلقائي للموسيقى مفعل");
                });
                document.getElementById('play-icon').innerText = "⏸";
                startCounter();
            } else {
                document.getElementById('error-txt').style.display = 'block';
            }
        }

        function startCounter() {
            // ضبط تاريخ البداية بدقة 4 سبتمبر 2025
            const startDate = new Date("2025-09-04T00:00:00").getTime(); 

            setInterval(function() {
                const now = new Date().getTime();
                const diff = now - startDate;
                
                // حساب الأيام والساعات والدقائق والثواني بدقة
                document.getElementById("days").innerText = Math.floor(diff / (1000 * 60 * 60 * 24));
                document.getElementById("hours").innerText = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                document.getElementById("mins").innerText = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
                document.getElementById("secs").innerText = Math.floor((diff % (1000 * 60)) / 1000);
            }, 1000);
        }

        function toggleMusic() {
            const audio = document.getElementById('bg-music');
            if (audio.paused) { audio.play(); document.getElementById('play-icon').innerText = "⏸"; }
            else { audio.pause(); document.getElementById('play-icon').innerText = "▶"; }
        }
    </style>
</body>
</html>
