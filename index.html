<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Our Love Story ❤️</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Arial, sans-serif;
background:black;
overflow-x:hidden;
color:white;
text-align:center;
}

.hero{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
background:linear-gradient(to bottom,#000,#1a001a);
position:relative;
}

.hero h1{
font-size:55px;
color:pink;
margin-bottom:20px;
animation:glow 2s infinite alternate;
}

.hero p{
font-size:22px;
width:80%;
max-width:600px;
line-height:1.6;
}

@keyframes glow{
from{
text-shadow:0 0 10px pink;
}
to{
text-shadow:0 0 30px hotpink;
}
}

.gallery{
padding:50px 20px;
}

.gallery h2{
font-size:40px;
margin-bottom:30px;
color:pink;
}

.photos{
display:flex;
gap:20px;
overflow-x:auto;
padding:10px;
}

.photos img{
width:250px;
height:350px;
object-fit:cover;
border-radius:20px;
transition:0.5s;
}

.photos img:hover{
transform:scale(1.08);
}

.counter{
margin:60px 0;
font-size:30px;
color:pink;
}

.heart{
position:fixed;
bottom:-20px;
color:red;
animation:float 5s linear infinite;
}

@keyframes float{
0%{
transform:translateY(0);
opacity:1;
}
100%{
transform:translateY(-120vh);
opacity:0;
}
}

button{
padding:15px 30px;
border:none;
border-radius:30px;
background:pink;
color:black;
font-size:18px;
cursor:pointer;
margin-top:30px;
font-weight:bold;
}

button:hover{
transform:scale(1.05);
}

audio{
display:none;
}

</style>
</head>

<body>

<section class="hero">

<h1>❤️ Our Love Story ❤️</h1>

<p>
Every moment with you becomes my favorite memory.
You are my happiness, my comfort, and my forever.
</p>

<button onclick="playMusic()">
Play Music 🎵
</button>

</section>

<section class="counter">

<p id="days"></p>

</section>

<section class="gallery">

<h2>Our Memories 📸</h2>

<div class="photos">

<img src="https://images.unsplash.com/photo-1516589178581-6cd7833ae3b2?q=80&w=800">

<img src="https://images.unsplash.com/photo-1518199266791-5375a83190b7?q=80&w=800">

<img src="https://images.unsplash.com/photo-1524504388940-b1c1722653e1?q=80&w=800">

<img src="https://images.unsplash.com/photo-1517841905240-472988babdf9?q=80&w=800">

</div>

</section>

<audio id="music" loop>
<source src="https://www.bensound.com/bensound-music/bensound-love.mp3" type="audio/mp3">
</audio>

<script>

function createHeart(){

const heart=document.createElement("div");

heart.classList.add("heart");

heart.innerHTML="❤️";

heart.style.left=Math.random()*100+"vw";

heart.style.fontSize=Math.random()*30+20+"px";

document.body.appendChild(heart);

setTimeout(()=>{
heart.remove();
},5000);

}

setInterval(createHeart,300);

function playMusic(){
document.getElementById("music").play();
}

const startDate = new Date("2024-01-01");

const today = new Date();

const diff = today - startDate;

const days = Math.floor(diff / (1000 * 60 * 60 * 24));

document.getElementById("days").innerHTML =
`❤️ Together for ${days} days ❤️`;

</script>

</body>
</html>
