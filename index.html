<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Fekry ❤️ Mariam</title>

<style>

body{
margin:0;
font-family:Arial;
background:radial-gradient(circle,#000,#120012);
color:white;
text-align:center;
overflow-x:hidden;
}

.lock{
position:fixed;
width:100%;
height:100%;
background:black;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
z-index:9999;
}

input{
padding:10px;
border-radius:10px;
border:none;
text-align:center;
}

button{
padding:10px 20px;
margin-top:10px;
border:none;
border-radius:20px;
background:pink;
font-weight:bold;
cursor:pointer;
}

h1{
color:pink;
font-size:40px;
margin-top:20px;
}

.counter{
color:pink;
margin:15px;
font-size:20px;
}

.typing{
font-size:18px;
max-width:700px;
margin:20px auto;
line-height:1.7;
min-height:80px;
padding:0 10px;
}

.gallery{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:10px;
padding:20px;
max-width:600px;
margin:auto;
}

.gallery img{
width:100%;
height:200px;
object-fit:cover;
border-radius:15px;
transition:0.3s;
}

.gallery img:hover{
transform:scale(1.05);
}

.musicBtn{
margin:15px;
}

.heart{
position:fixed;
bottom:-10px;
color:red;
animation:float 5s linear infinite;
}

@keyframes float{
0%{transform:translateY(0);opacity:1;}
100%{transform:translateY(-120vh);opacity:0;}
}

</style>
</head>

<body>

<!-- PASSWORD SCREEN -->
<div class="lock" id="lock">
<h2>Enter Password ❤️</h2>
<input type="password" id="pass" placeholder="Password">
<button onclick="checkPass()">Enter</button>
</div>

<!-- MAIN CONTENT -->
<h1>Fekry ❤️ Mariam</h1>

<div class="counter" id="days"></div>

<!-- MUSIC -->
<button class="musicBtn" onclick="toggleMusic()">Play / Pause Music 🎵</button>

<audio id="music" loop>
<source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_d1a7a0c6d2.mp3?filename=romantic-music-ambient-110397.mp3" type="audio/mp3">
</audio>

<!-- TYPING LOVE MESSAGE -->
<div class="typing" id="typing"></div>

<!-- GALLERY -->
<div class="gallery">
<img src="https://images.unsplash.com/photo-1518199266791-5375a83190b7">
<img src="https://images.unsplash.com/photo-1524504388940-b1c1722653e1">
<img src="https://images.unsplash.com/photo-1516589178581-6cd7833ae3b2">
<img src="https://images.unsplash.com/photo-1517841905240-472988babdf9">
</div>

<script>

// PASSWORD
function checkPass(){
let p=document.getElementById("pass").value;
if(p==="Love"){
document.getElementById("lock").style.display="none";
}else{
alert("Wrong Password ❤️");
}
}

// HEARTS
setInterval(()=>{
let h=document.createElement("div");
h.classList.add("heart");
h.innerHTML="❤️";
h.style.left=Math.random()*100+"vw";
h.style.fontSize=Math.random()*25+15+"px";
document.body.appendChild(h);
setTimeout(()=>h.remove(),5000);
},300);

// DAYS COUNTER
let startDate=new Date("2025-09-04");
let now=new Date();
let diff=now-startDate;
let days=Math.floor(diff/(1000*60*60*24));

document.getElementById("days").innerHTML=
"❤️ Together for "+days+" days ❤️";

// MUSIC TOGGLE
function toggleMusic(){
let m=document.getElementById("music");
if(m.paused){
m.play();
}else{
m.pause();
}
}

// TYPING EFFECT
let text="بحبك اوي يا مريم ❤️ انتي احسن حاجة حصلتلي في حياتي، وجودك في حياتي هو العوض الحقيقي والسند ليا طول العمر ❤️";
let i=0;

function type(){
if(i<text.length){
document.getElementById("typing").innerHTML+=text.charAt(i);
i++;
setTimeout(type,50);
}
}

type();

</script>

</body>
</html>
