<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Love ❤️</title>

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#0b0010,#000);
color:white;
text-align:center;
padding:20px;
}

/* TITLE */
h1{
color:pink;
font-size:28px;
margin-top:10px;
}

/* CARD */
.card{
margin:15px auto;
padding:15px;
max-width:350px;
background:rgba(255,255,255,0.08);
border-radius:15px;
backdrop-filter:blur(10px);
color:pink;
box-shadow:0 0 15px rgba(255,105,180,0.2);
font-size:14px;
}

/* IMAGES */
img{
width:100%;
max-width:320px;
margin:10px 0;
border-radius:15px;
box-shadow:0 0 10px rgba(255,105,180,0.2);
}

/* BUTTON */
button{
padding:12px 20px;
border:none;
border-radius:25px;
background:pink;
font-weight:bold;
cursor:pointer;
margin-top:10px;
}

/* HEARTS */
.heart{
position:fixed;
bottom:-10px;
color:red;
animation:float 5s linear forwards;
}

@keyframes float{
0%{transform:translateY(0);opacity:1;}
100%{transform:translateY(-120vh);opacity:0;}
}

</style>
</head>

<body>

<h1>Fekry ❤️ Mariam</h1>

<div class="card" id="counter"></div>

<img src="https://raw.githubusercontent.com/56wrcjv67t-lgtm/love_site/main/IMG_7882.jpeg">
<img src="https://raw.githubusercontent.com/56wrcjv67t-lgtm/love_site/main/F2BCD207-D6DD-4B3F-887D-3F670C2628A3.jpeg">

<button onclick="startMusic()">Open Memory 💖</button>

<audio id="music">
<source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_d1a7a0c6d2.mp3">
</audio>

<script>

/* MUSIC */
function startMusic(){
document.getElementById("music").play().catch(()=>{});
}

/* COUNTER */
let startDate = new Date("2025-09-04");

setInterval(()=>{
let now = new Date();
let diff = now - startDate;

let d = Math.floor(diff / (1000*60*60*24));
let h = Math.floor((diff / (1000*60*60)) % 24);
let m = Math.floor((diff / (1000*60)) % 60);
let s = Math.floor((diff / 1000) % 60);

document.getElementById("counter").innerHTML =
"💖 Our Journey Together<br><br>" +
d+"d : "+h+"h : "+m+"m : "+s+"s";

},1000);

/* HEARTS */
setInterval(()=>{
let h=document.createElement("div");
h.className="heart";
h.innerHTML="❤️";
h.style.left=Math.random()*100+"vw";
h.style.fontSize=(14+Math.random()*18)+"px";
document.body.appendChild(h);
setTimeout(()=>h.remove(),5000);
},500);

</script>

</body>
</html>
